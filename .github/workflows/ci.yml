name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Run tests
        run: pytest tests/
      - name: Run ruff
        run: ruff check .
