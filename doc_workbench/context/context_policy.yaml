acquisition_order:
  - official_site
  - regulatory_filings
  - search_expansion
  - followup_extraction

preferred_candidate_kinds:
  - official_pdf
  - regulatory_filing
  - official_html
  - third_party_pdf
  - other

same_domain_preference:
  enabled: true
  score_bonus: 0.35
  require_for_auto_approve: false

review_thresholds:
  approved_min_confidence: 0.8
  needs_review_min_confidence: 0.45

followup_search:
  require_explicit_flag: true
  skip_if_higher_priority_approved: true
  allowed_seed_source_tiers:
    - search_same_domain
    - search_fallback
